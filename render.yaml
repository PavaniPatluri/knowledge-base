services:
  - type: web
    name: knowledge-base-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma db push && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: GEMINI_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        value: xoxb-dummy-token
      - key: SLACK_APP_TOKEN
        value: xapp-dummy-token
    healthCheckPath: /
